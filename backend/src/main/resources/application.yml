server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crafttree}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    # Lazy yuklashni xizmat (transaksiya) qatlamiga cheklaydi — yashirin N+1 so'rovlar
    # view render paytida sodir bo'lmaydi. Yangi assotsiatsiya qo'shilsa, fetch'ni
    # service'da aniq qilish kerak (aks holda LazyInitializationException — bu yaxshi signal).
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Lazy assotsiatsiyalarni alohida SELECT o'rniga IN(...) bilan to'plab oladi (N+1 yumshatish).
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  uploads:
    path: uploads
  scripts:
    python: python
  jwt:
    # FAQAT lokal/dev fallback. Production JWT_SECRET ni MAJBURIY beradi
    # (application-prod.yml'da default yo'q — env bo'lmasa ilova ishga tushmaydi).
    secret: ${JWT_SECRET:YtxufUTHMuLajxc2F09KFB6L9gs/xh7KjoL8t1b4T0MBlxs0xZrC1oGUmP5Oi1Ei}
    expiration: 86400000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
