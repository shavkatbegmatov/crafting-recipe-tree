server:
  port: 8080
  forward-headers-strategy: framework
  # Deploy/restart paytida ishlab turgan so'rovlarni uzmasdan to'xtatish (502 oldini oladi).
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:crafttree}
    username: ${DB_USERNAME:postgres}
    # Production'da DB_PASSWORD majburiy — default yo'q (zaif "postgres" ga tushmaslik uchun).
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      max-lifetime: 1740000          # 29 daqiqa — PostgreSQL idle timeout'idan past
      connection-timeout: 30000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 25s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  uploads:
    path: uploads
  scripts:
    python: python
  jwt:
    # MAJBURIY: default yo'q. JWT_SECRET o'rnatilmasa ilova ishga tushmaydi (soxta token xavfi).
    secret: ${JWT_SECRET}
    expiration: 86400000
  cors:
    # Comma-separated list of origins allowed to hit /api/** and /uploads/**
    # In production set via env APP_CORS_ALLOWED_ORIGINS=https://your-frontend.com
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    root: INFO
    com.crafttree: INFO
  # Structured JSON loglar (Spring Boot 3.4 native, qo'shimcha kutubxonasiz) —
  # Coolify/Loki/ELK kabi log yig'uvchilar maydonlarni to'g'ri ajratadi.
  structured:
    format:
      console: ecs
