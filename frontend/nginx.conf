server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # API proxy (used only when docker-compose places backend on the same network).
    # The `resolver` + `set $backend` trick makes nginx resolve at runtime, not
    # startup, so the container starts cleanly even when "backend" does not exist
    # (e.g. standalone Coolify deploy — in that case the frontend uses
    # VITE_API_BASE_URL baked in at build time and hits the backend directly).
    location /api {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        client_max_body_size 10M;
    }

    # Uploaded images proxy (same resilience trick)
    location /uploads {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Swagger UI proxy
    location /swagger-ui {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://backend:8080;
        proxy_pass $backend;
    }

    location /api-docs {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://backend:8080;
        proxy_pass $backend;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
