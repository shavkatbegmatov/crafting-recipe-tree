<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1510" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Tree trunk -->
  <rect x="29" y="34" width="6" height="14" rx="1" fill="#8B6914"/>
  <!-- Tree crown (layered triangles) -->
