  <polygon points="32,16 22,32 42,32" fill="url(#g)"/>
  <polygon points="32,22 24,36 40,36" fill="url(#g)"/>
  <!-- Craft sparkle -->
  <circle cx="32" cy="18" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="26" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="37" cy="24" r="1" fill="#fff" opacity="0.6"/>
