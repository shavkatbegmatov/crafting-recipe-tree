services:
  postgres:
    image: postgres:16-alpine
    container_name: crafting-recipe-db
    environment:
      POSTGRES_DB: crafttree
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: crafting-recipe-tree-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crafttree
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: crafting-recipe-tree-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
