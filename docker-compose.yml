services:
  postgres:
    image: postgres:16-alpine
    container_name: crafting-recipe-db
    environment:
      POSTGRES_DB: ${DB_NAME:-crafttree}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/shavkatbegmatov/crafting-recipe-tree-backend:latest
    container_name: crafting-recipe-tree-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crafttree}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-Y3JhZnRpbmctcmVjaXBlLXRyZWUtand0LXNlY3JldC1rZXktMjAyNg==}
    volumes:
      - uploads:/app/uploads

  frontend:
    image: ghcr.io/shavkatbegmatov/crafting-recipe-tree-frontend:latest
    container_name: crafting-recipe-tree-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
